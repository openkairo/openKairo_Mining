reboot:
  description: "Rebootet den ASIC Miner hardwareseitig."
  fields:
    ip_address:
      description: "IP-Adresse des Miners"
      example: "192.168.2.6"
      required: true

restart_backend:
  description: "Startet das Mining-Backend des ASICs neu."
  fields:
    ip_address:
      description: "IP-Adresse des Miners"
      example: "192.168.2.6"
      required: true

set_work_mode:
  description: "Ändert den Arbeitsmodus des Miners."
  fields:
    ip_address:
      description: "IP-Adresse des Miners"
      example: "192.168.2.6"
      required: true
    mode:
      description: "Modus (low, normal, high)"
      example: "normal"
      required: true

set_power_limit:
  description: "Setzt das Power Limit des Miners."
  fields:
    ip_address:
      description: "IP-Adresse des Miners"
      example: "192.168.2.6"
      required: true
    limit:
      description: "Watt (z.B. 1200)"
      example: 1200
      required: true

set_integration_mode:
  name: "Integration Modus setzen"
  description: "Ändert den Betriebsmodus des Dashboards (AI, PV, SOC, etc.)."
  fields:
    ip_address:
      name: "IP-Adresse"
      description: "Die IP-Adresse des Miners."
      required: true
      example: "192.168.2.185"
    mode:
      name: "Modus"
      description: "Wähle: pv, ai_discharge, soc, offgrid, manual, heating"
      required: true
      example: "pv"
